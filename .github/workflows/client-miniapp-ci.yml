name: Client Mini App CI

on:
  push:
  pull_request:

jobs:
  client-miniapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client-miniapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # pnpm workspace lockfile lives at repo root; install must run here, not in apps/client-miniapp
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck Mini App
        run: pnpm typecheck

      - name: Build Mini App
        run: pnpm build
