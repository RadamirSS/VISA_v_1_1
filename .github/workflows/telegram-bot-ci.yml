name: Telegram Bot CI

on:
  push:
  pull_request:

jobs:
  telegram-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/telegram-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install bot package
        run: pip install -e .

      - name: Compile bot
        run: python -m compileall bot

      - name: Run tests
        run: pytest
